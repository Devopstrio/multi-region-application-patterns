version: '3.8'

services:
  global-gateway:
    build:
      context: .
      dockerfile: apps/global-gateway/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env

  api-region-a:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8001:8000"
    environment:
      - CURRENT_REGION=us-east-1
    env_file: .env
    depends_on:
      - db-region-a
      - redis-region-a

  api-region-b:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8002:8000"
    environment:
      - CURRENT_REGION=eu-west-1
    env_file: .env
    depends_on:
      - db-region-b
      - redis-region-b

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - global-gateway

  db-region-a:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=multi_region_db_a

  db-region-b:
    image: postgres:15-alpine
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_DB=multi_region_db_b

  redis-region-a:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  redis-region-b:
    image: redis:7-alpine
    ports:
      - "6381:6379"

  kafka:
    image: bitnami/kafka:3.4.0
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
